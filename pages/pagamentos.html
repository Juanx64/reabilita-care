<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finalizar Pagamento</title>
    <link rel="stylesheet" href="../assets/styles/pagamentos.css"/>
  </head>
  <body>
    <div class="payment-container">
      <h2>Finalizar Pagamento</h2>
      <p>Preencha os campos abaixo</p>

      <form>
        <label>Selecione a forma de pagamento:</label>
        <div class="payment-methods">
          <label>
            <input type="radio" name="method" value="credito" checked />
            <div class="method-option">Crédito</div>
          </label>
          <label>
            <input type="radio" name="method" value="debito" />
            <div class="method-option">Débito</div>
          </label>
        </div>

        <div class="form-group">
          <label for="nome">Nome Completo (como no cartão)</label>
          <input type="text" id="nome" placeholder="Ex: João Silva" required />
        </div>

        <div class="form-group">
          <label for="nome">Numero do cartão</label>
          <input type="text" id="nome" placeholder="0000.0000.0000.0000" required />
        </div>


        <div class="form-group">
          <label for="cpf">CPF</label>
          <input type="text" id="cpf" placeholder="000.000.000-00" maxlength="14" pattern="\d{3}\.\d{3}\.\d{3}-\d{2}" required />
        </div>

        <button type="submit" class="btn-pay">Pagar Agora</button>

        <div class="submit-container">
                    <input type="submit" id="submit">
                    <a href="index.html" class="btn-voltar">← Voltar para o menu</a>
                </div>

        <div class="security-note">
          <svg width="14" height="14" fill="currentColor" viewBox="0 0 20 20">
            <path
              d="M10 2a5 5 0 00-5 5v2a2 2 0 00-2 2v5a2 2 0 002 2h10a2 2 0 002-2v-5a2 2 0 00-2-2V7a5 5 0 00-5-5zM7 7a3 3 0 116 0v2H7V7z"
            ></path>
          </svg>
          Ambiente seguro
        </div> 
      </form>
    </div>
  </body>
</html>
