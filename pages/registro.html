<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro</title>
    <style>
      body {
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background-image: url("../assets/images/imagemfundo.jpeg");
        background-repeat: no-repeat;
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        margin: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        padding: 20px; /* Espaço para não colar em telas pequenas */
      }
      .box {
        background-color: rgba(255, 255, 255, 0.9);
        padding: 40px;
        border-radius: 30px;
        width: 450px;
        color: black;
        box-shadow: 0px 10px 20px rgba(0, 0, 0, 0.2);
      }
      fieldset {
        border: 3px solid rgb(103, 170, 201);
        border-radius: 20px;
        padding: 20px;
      }
      legend {
        border: 1px solid rgb(111, 175, 240);
        padding: 10px;
        text-align: center;
        background-color: rgb(111, 175, 240);
        color: white;
        border-radius: 8px;
        font-weight: bold;
      }
      .inputBox {
        position: relative;
        margin-bottom: 25px;
      }
      .inputUser {
        background: none;
        border: none;
        border-bottom: 1px solid rgb(0, 0, 0);
        outline: none;
        color: black;
        font-size: 15px;
        width: 100%;
        letter-spacing: 1px;
        padding-top: 10px;
      }
      .labelInput {
        position: absolute;
        top: 0px;
        left: 0px;
        pointer-events: none;
        transition: 0.3s;
        color: gray;
      }
      .inputUser:focus ~ .labelInput,
      .inputUser:valid ~ .labelInput {
        top: -15px;
        font-size: 12px;
        color: rgb(103, 170, 201);
      }
      #submit {
        background-image: linear-gradient(
          to right,
          rgb(0, 80, 172),
          rgb(103, 170, 201)
        );
        width: 100%;
        border: none;
        padding: 15px;
        color: white;
        font-size: 15px;
        cursor: pointer;
        border-radius: 10px;
        margin-top: 10px;
      }
      #submit:hover {
        background-image: linear-gradient(
          to right,
          rgb(0, 50, 120),
          rgb(80, 150, 180)
        );
      }
    </style>
  </head>
  <body>
    <!-- Logo -->
    <a href="index.html" class="imagem-canto">
      <img src="../assets/images/logosemfundo.png" alt="logo" />
    </a>
    <div class="box">
      <form action="">
        <fieldset>
          <legend><b>Cadastro</b></legend>
          <br />

          <div class="inputBox">
            <input
              type="text"
              name="Nome"
              id="Nome"
              class="inputUser"
              required
            />
            <label for="Nome" class="labelInput">Nome Completo</label>
          </div>

          <div class="inputBox">
            <input
              type="email"
              name="E-mail"
              id="E-mail"
              class="inputUser"
              required
            />
            <label for="E-mail" class="labelInput">E-mail</label>
          </div>

          <div class="inputBox">
            <input type="text" name="cpf" id="cpf" class="inputUser" required />
            <label for="cpf" class="labelInput">CPF</label>
          </div>

          <div class="inputBox">
            <input
              type="password"
              name="senha"
              id="senha"
              class="inputUser"
              required
            />
            <label for="senha" class="labelInput">Senha</label>
          </div>

          <div class="inputBox">
            <input
              type="tel"
              name="telefone"
              id="telefone"
              class="inputUser"
              required
            />
            <label for="telefone" class="labelInput">Telefone</label>
          </div>

          <p><b>Selecione o sexo:</b></p>
          <input type="radio" id="masc" name="sexo" value="masculino" />
          <label for="masc">Masculino</label><br />
          <input type="radio" id="fem" name="sexo" value="feminino" />
          <label for="fem">Feminino</label><br />
          <input type="radio" id="outro" name="sexo" value="outro" />
          <label for="outro">Outro</label>
          <br /><br />

          <label for="data_nascimento"><b>Data de Nascimento:</b></label>
          <input
            type="date"
            name="data_nascimento"
            id="data_nascimento"
            class="inputUser"
            required
          />
          <br /><br />

          <div class="inputBox">
            <input type="text" name="cep" id="cep" class="inputUser" required />
            <label for="cep" class="labelInput">CEP</label>
          </div>

          <div class="inputBox">
            <input
              type="text"
              name="Cidade"
              id="Cidade"
              class="inputUser"
              required
            />
            <label for="Cidade" class="labelInput">Cidade</label>
          </div>

          <div class="inputBox">
            <input
              type="text"
              name="Estado"
              id="Estado"
              class="inputUser"
              required
            />
            <label for="Estado" class="labelInput">Estado</label>
          </div>

          <input type="submit" name="submit" id="submit" value="Enviar" />
        </fieldset>
      </form>
    </div>
  </body>
</html>
